name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          request_pty: true
          script: |
            set -e

            echo "===== DEBUG ====="
            whoami
            id
            pwd
            sudo -l
            echo "================="

            echo "Deploy started"

            cd ~/farmcareservices/webapp
            git pull origin main

            echo "Backend update"
            cd backend

            /home/farmcareservices_user/farmcareservices/webapp/backend/venv/bin/pip install -r requirements.txt

            sudo -n /usr/bin/systemctl restart fastapi

            echo "Frontend build"
            cd ../frontend

            npm ci || npm install
            npm run build

            sudo -n rm -rf /var/www/farmcareservices_user/*
            sudo -n cp -r dist/* /var/www/farmcareservices_user/

            sudo -n /usr/bin/systemctl reload nginx

            echo "Deploy complete"
